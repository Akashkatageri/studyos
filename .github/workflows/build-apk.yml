name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Application
        run: npm run build

      - name: Create Web Directory if Missing
        run: mkdir -p dist

      - name: Sync Web Assets to Android Project
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: 'gradle'

      - name: Regenerate Gradle Wrapper Freshly
        run: |
          mkdir -p /tmp/gradle-fresh
          cd /tmp/gradle-fresh
          gradle wrapper --gradle-version 8.14.3
          cd $GITHUB_WORKSPACE
          rm -f android/gradle/wrapper/gradle-wrapper.jar
          cp /tmp/gradle-fresh/gradle/wrapper/gradle-wrapper.jar android/gradle/wrapper/gradle-wrapper.jar

      - name: Make Gradle Wrapper Executable and Sanitize Line Endings
        run: |
          sed -i 's/\r$//' android/gradlew
          chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StudyOS-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
